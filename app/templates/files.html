{% extends 'base.html' %}

{% block main %}
<div class="container">
    <h1>Uploaded Images</h1>
    <ul class="image-grid">
        {% for image in images %}
            <li>
                <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}" class="img-thumbnail">
                
            </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
